id: cz.ondrejkolin.Barcoder
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: barcoder
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    RUST_BACKTRACE: "1"
    RUST_LOG: barcoder=debug
modules:
  - name: barcoder
    builddir: true
    buildsystem: meson
    config-opts:
      - -Dprofile=flathub
    sources:
      - cargo-sources.json
      - type: git
        tag: 0.3.1
        commit: be14bc4a569bfecbdbcad588ebf17e006ec23e55
        url: https://gitlab.com/ondrej.kolin/barcoder.git
