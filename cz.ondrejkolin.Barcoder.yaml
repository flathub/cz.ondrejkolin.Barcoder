---
id: cz.ondrejkolin.Barcoder
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: barcoder
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/pkgconfig
  - "*.a"
  - "*.la"
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    RUST_BACKTRACE: "1"
    RUST_LOG: barcoder=debug
modules:
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
    - '*'
    sources:
    - type: git
      url: https://gitlab.gnome.org/jwestman/blueprint-compiler
      commit: 07c9c9df9cd1b6b4454ecba21ee58211e9144a4b
      tag: v0.18.0
  - name: barcoder
    builddir: true
    buildsystem: meson
    config-opts:
      - "-Dprofile=flathub"
    sources:
      - cargo-sources.json
      - type: git
        tag: 0.3.0
        commit: 5827de8dc4f2cc7e2adecd4ccd8c7910b1e16852
        url: https://gitlab.com/ondrej.kolin/barcoder.git
